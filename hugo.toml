baseURL = "https://ivelten.github.io/daily-haskell/"
title = "Daily Haskell In Real Life"
theme = "hugo-coder"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = true

[pagination]
  pagerSize = 10

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[params]
  author = "ivelten"
  description = "Deep, practical Haskell for working engineers — real-world patterns, libraries, and techniques for daily professional use."
  keywords = "blog,haskell,functional-programming,engineering"
  info = ["Haskell Engineer"]
  dateFormat = "January 2, 2006"
  since = 2025
  colorScheme = "auto"
  hideColorSchemeToggle = false
  customCSS = []
  customJS = []

[[params.social]]
  name = "GitHub"
  icon = "fa-brands fa-github fa-2x"
  weight = 1
  url = "https://github.com/ivelten/"

[[params.social]]
  name = "RSS"
  icon = "fa-solid fa-rss fa-2x"
  weight = 2
  url = "https://ivelten.github.io/daily-haskell/index.xml"
  rel = "alternate"
  type = "application/rss+xml"

[[menu.main]]
  name = "Blog"
  weight = 1
  url = "posts/"

[[menu.main]]
  name = "Tags"
  weight = 2
  url = "tags/"

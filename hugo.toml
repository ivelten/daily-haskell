baseURL = "https://ivelten.github.io/daily-haskell/"
title = "Daily Haskell In Real Life"
theme = "hugo-coder"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = true

[pagination]
  pagerSize = 10

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[params]
  author = "Ismael Velten"
  description = "Deep, practical Haskell for working engineers — real-world patterns, libraries, and techniques for daily professional use."
  keywords = "blog,haskell,functional-programming,engineering"
  info = ["Senior Software Engineer"]
  avatarURL = "images/avatar.jpg"
  dateFormat = "January 2, 2006"
  since = 2026
  colorScheme = "auto"
  hideColorSchemeToggle = false
  customCSS = []
  customJS = []

[params.giscus]
  repo             = "ivelten/daily-haskell"
  repoID           = "R_kgDORejQAg"
  category         = "Announcements"
  categoryID       = "DIC_kwDORejQAs4C3ygD"
  mapping          = "pathname"
  strict           = "0"
  reactionsEnabled = "1"
  emitMetadata     = "0"
  inputPosition    = "bottom"
  theme            = "preferred_color_scheme"
  lang             = "pt"
  loading          = "lazy"


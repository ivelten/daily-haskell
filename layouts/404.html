{{ define "content" }}
<section class="container centered">
  <div class="error">
    <h1>404</h1>
    <div id="msg-en">
      <h2>Page Not Found</h2>
      <p>Sorry, this page does not exist.<br />
        You can head back to the <a href="{{ .Site.BaseURL }}">homepage</a>.
      </p>
    </div>
    <div id="msg-pt" style="display:none">
      <h2>Página Não Encontrada</h2>
      <p>Desculpe, essa página não existe.<br />
        Você pode voltar para a <a href="{{ .Site.BaseURL }}pt-br/">página inicial</a>.
      </p>
    </div>
  </div>
</section>

<script>
  (function () {
    var path = window.location.pathname;
    var base = "{{ .Site.BaseURL }}";
    var isPtBr = path.indexOf('/pt-br/') !== -1;
    if (!isPtBr) return;

    document.getElementById('msg-en').style.display = 'none';
    document.getElementById('msg-pt').style.display = '';

    var navTitle = document.querySelector('a.navigation-title');
    if (navTitle) {
      navTitle.textContent = 'Haskell no Dia a Dia';
      navTitle.href = base + 'pt-br/';
    }

    var navLinks = document.querySelectorAll('a.navigation-link');
    navLinks.forEach(function (link) {
      var text = link.textContent.trim();
      if (text === 'About') {
        link.textContent = 'Sobre';
        link.href = base + 'pt-br/about/';
      } else if (text === 'Blog') {
        link.href = base + 'pt-br/posts/';
      } else if (text === 'Tags') {
        link.href = base + 'pt-br/tags/';
      }
    });

    document.addEventListener('DOMContentLoaded', function () {
      var footer = document.querySelector('footer.footer');
      if (footer) {
        footer.innerHTML = footer.innerHTML.replace('Powered by', 'Promovido por');
      }
    });
  })();
</script>
{{ end }}
